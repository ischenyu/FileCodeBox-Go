# GitHub Actions: 构建 Docker 镜像并发布版本
#
# 触发条件:
#   - push 到 main/master 分支 → 构建并推送 latest 标签
#   - 推送 v* 标签 (如 v3.0.0) → 构建并推送版本标签 + latest
#   - PR 到 main → 仅构建测试（不推送）

name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}   # 新增：映射 secret 到环境变量

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -v -count=1

  # 构建 Docker 镜像
  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/filecodebox-go
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REPOSITORY_TOKEN }}

      - name: Login to Docker Hub
        # 修正：使用 env.DOCKERHUB_USERNAME 判断，而非 secrets
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 版本发布
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/filecodebox-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/filecodebox-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/filecodebox-windows-amd64.exe .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/filecodebox-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/filecodebox-darwin-arm64 .

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Generate changelog
        run: |
          # 如果模板文件不存在，创建默认模板
          if [ ! -f .github/release_body_template.md ]; then
            cat > .github/release_body_template.md <<'EOF'
          ## FileCodeBox-Go ${{ github.ref_name }}

          匿名口令分享文本和文件

          ### 🚀 Docker 部署
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker run -d -p 12345:12345 -v ./data:/app/data ghcr.io/${{ github.repository }}:${{ github.ref_name }}